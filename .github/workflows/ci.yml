name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs on the same branch when a newer commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Formatting check ────────────────────────────────────────────────────────
  format:
    name: Prettier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.11.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Check formatting
        run: pnpm run format:check

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.11.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Lint
        run: pnpm run lint

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.11.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Run tests
        run: pnpm run test --ci --forceExit
