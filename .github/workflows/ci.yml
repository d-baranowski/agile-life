name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs on the same branch when a newer commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Code quality + tests (single VM) ────────────────────────────────────────
  quality:
    name: Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: '10.11.0'

      - uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Prettier
        run: pnpm run format:check

      - name: ESLint
        run: pnpm run lint

      - name: TypeScript
        run: pnpm run typecheck

      - name: knip (unused exports)
        run: pnpm run knip

      - name: Dependency cruiser (architecture)
        run: pnpm run depcruise

      - name: lib/ gravity (colocation)
        run: pnpm run lib-gravity

      - name: Unit tests
        run: pnpm run test:coverage --ci --forceExit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Security audit ──────────────────────────────────────────────────────────
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: '10.11.0'

      - uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Run audit
        run: pnpm audit --audit-level high

  # ── Bundle size analysis ─────────────────────────────────────────────────────
  bundle:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: '10.11.0'

      - uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Build (with bundle analysis)
        run: pnpm run build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
