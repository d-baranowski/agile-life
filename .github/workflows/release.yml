name: Release

on:
  push:
    branches:
      - '**'

# Cancel in-progress release runs on the same branch when a newer commit is pushed
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Per-platform builds ──────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.11.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Package (Linux — AppImage + deb)
        if: matrix.platform == 'linux'
        run: pnpm exec electron-builder --linux AppImage deb --publish never

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: pnpm exec electron-builder --win --publish never

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        run: pnpm exec electron-builder --mac --publish never
        env:
          # Skip code-signing when no certificate is configured
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifacts
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  # ── Create / update GitHub Release ──────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          merge-multiple: true
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          files: release-artifacts/**/*
          generate_release_notes: true
          make_latest: true
