name: Codacy Analysis

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

# Cancel in-progress runs on the same branch when a newer commit is pushed
concurrency:
  group: codacy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codacy-security-scan:
    name: Codacy Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@v4.4.7
        continue-on-error: true
        with:
          output: results.sarif
          format: sarif
          # Adjust severity of non-security issues for code scanning compatibility
          gh-code-scanning-compat: true
          # Allow unlimited issues — security scanning is handled by pnpm audit
          max-allowed-issues: 2147483647

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: results.sarif
